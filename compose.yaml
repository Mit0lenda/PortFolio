services:
  # ── Next.js 15 — Portfolio Frontend (port 3000) ──────────────────────────────
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-nextjs
    ports:
      - "3000:3000"
    env_file:
      - .env.local        # create from .env.example; never committed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
