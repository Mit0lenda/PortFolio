<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#181818"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#grid)"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#232323" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- corner brackets, brutalist system -->
  <path d="M 48 96 L 48 48 L 96 48" fill="none" stroke="#F24A00" stroke-width="2"/>
  <path d="M 704 48 L 752 48 L 752 96" fill="none" stroke="#F24A00" stroke-width="2"/>
  <path d="M 48 504 L 48 552 L 96 552" fill="none" stroke="#F24A00" stroke-width="2"/>
  <path d="M 704 552 L 752 552 L 752 504" fill="none" stroke="#F24A00" stroke-width="2"/>

  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="64" letter-spacing="2" fill="#F7F2E8" text-transform="uppercase">ATLAS</text>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="13" letter-spacing="3" fill="#6b6b6b">SISTEMA FINANCEIRO FGTS</text>

  <!-- simple bar-chart glyph -->
  <g transform="translate(360,340)">
    <rect x="0"  y="30" width="14" height="30" fill="#00AEEF"/>
    <rect x="20" y="14" width="14" height="46" fill="#F24A00"/>
    <rect x="40" y="0"  width="14" height="60" fill="#00F5A0"/>
    <rect x="60" y="20" width="14" height="40" fill="#F7F2E8" opacity="0.5"/>
  </g>

  <text x="400" y="440" text-anchor="middle" font-family="Consolas, monospace" font-size="11" letter-spacing="1" fill="#6b6b6b">// SISTEMA DESCONTINUADO — SEM CAPTURA DISPONÍVEL</text>
</svg>
